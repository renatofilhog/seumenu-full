info:
  title: ERPFood API
  description: Documentação da API do ERPFood
  version: 1.0-BETA
  contact: {}
tags: []
servers: []
components:
  schemas:
    CreateUserDto:
      type: object
      properties:
        nome:
          type: string
        email:
          type: string
        senha:
          type: string
        roleId:
          type: number
      required:
        - nome
        - email
        - senha
        - roleId
    Role:
      type: object
      properties:
        id:
          type: number
        nome:
          type: string
        descricao:
          type: string
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
        permissions:
          type: array
          items:
            type: string
      required:
        - id
        - nome
        - descricao
        - criadoEm
        - atualizadoEm
        - permissions
    User:
      type: object
      properties:
        id:
          type: number
        nome:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
      required:
        - id
        - nome
        - email
        - role
        - criadoEm
        - atualizadoEm
    CreateRoleDto:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: string
        permissionIds:
          type: array
          items:
            type: number
      required:
        - nome
        - descricao
    CreatePermissionDto:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: string
        roleIds:
          type: array
          items:
            type: number
      required:
        - nome
        - descricao
    Permission:
      type: object
      properties:
        id:
          type: number
        nome:
          type: string
        roles:
          type: array
          items:
            type: string
        descricao:
          type: string
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
      required:
        - id
        - nome
        - roles
        - descricao
        - criadoEm
        - atualizadoEm
    CreateProductGroupDto:
      type: object
      properties:
        nome:
          type: string
        ativo:
          type: boolean
        ordem:
          type: number
      required:
        - nome
        - ativo
        - ordem
    ProductGroup:
      type: object
      properties:
        id:
          type: number
        nome:
          type: string
        ativo:
          type: boolean
        ordem:
          type: number
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
      required:
        - id
        - nome
        - ativo
        - ordem
        - criadoEm
        - atualizadoEm
        - products
    Additional:
      type: object
      properties:
        id:
          type: number
        nome:
          type: string
        quantidadeMax:
          type: number
        preco:
          type: string
        ativo:
          type: boolean
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
      required:
        - id
        - nome
        - quantidadeMax
        - preco
        - ativo
        - products
        - criadoEm
        - atualizadoEm
    Product:
      type: object
      properties:
        id:
          type: number
        nome:
          type: string
        descricao:
          type: string
        preco:
          type: string
        ativo:
          type: boolean
        imagemUrl:
          type: string
        ordem:
          type: number
        grupo:
          $ref: '#/components/schemas/ProductGroup'
        additionals:
          type: array
          items:
            $ref: '#/components/schemas/Additional'
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
      required:
        - id
        - nome
        - descricao
        - preco
        - ativo
        - imagemUrl
        - grupo
        - additionals
        - criadoEm
        - atualizadoEm
    CreateProductDto:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: string
        preco:
          type: string
        ativo:
          type: boolean
        imagemUrl:
          type: string
        ordem:
          type: number
        grupoId:
          type: number
        additionalIds:
          type: array
          items:
            type: number
      required:
        - nome
        - descricao
        - preco
        - ativo
        - imagemUrl
        - grupoId
    CreateAdditionalDto:
      type: object
      properties:
        nome:
          type: string
        quantidadeMax:
          type: number
        preco:
          type: string
        ativo:
          type: boolean
        productIds:
          type: array
          items:
            type: number
      required:
        - nome
        - quantidadeMax
        - preco
        - ativo
    CreateMesaDto:
      type: object
      properties:
        numero:
          type: number
        descricao:
          type: string
        setor:
          type: string
        ativo:
          type: boolean
      required:
        - numero
        - descricao
        - setor
        - ativo
    Mesa:
      type: object
      properties:
        id:
          type: number
        numero:
          type: number
        descricao:
          type: string
        setor:
          type: string
        ativo:
          type: boolean
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
      required:
        - id
        - numero
        - descricao
        - setor
        - ativo
        - criadoEm
        - atualizadoEm
    CreatePedidoDto:
      type: object
      properties:
        numero:
          type: number
        valorLiq:
          type: string
        valorDesc:
          type: string
        valorTotal:
          type: string
        data:
          type: string
        mesaId:
          type: number
        status:
          type: string
          enum:
            - em_analise
            - preparando
            - feito
        codCupom:
          type: string
      required:
        - numero
        - valorLiq
        - valorDesc
        - valorTotal
        - data
        - mesaId
        - status
    Pedido:
      type: object
      properties:
        id:
          type: number
        numero:
          type: number
        valorLiq:
          type: string
        valorDesc:
          type: string
        valorTotal:
          type: string
        data:
          format: date-time
          type: string
        status:
          type: string
          enum:
            - em_analise
            - preparando
            - feito
        codCupom:
          type: string
        mesa:
          $ref: '#/components/schemas/Mesa'
        itens:
          type: array
          items:
            $ref: '#/components/schemas/PedidoItem'
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
      required:
        - id
        - numero
        - valorLiq
        - valorDesc
        - valorTotal
        - data
        - status
        - mesa
        - itens
        - criadoEm
        - atualizadoEm
    PedidoItem:
      type: object
      properties:
        id:
          type: number
        valorUnit:
          type: string
        qtSolicitada:
          type: number
        vlDesconto:
          type: string
        vlTotal:
          type: string
        pedido:
          $ref: '#/components/schemas/Pedido'
        produto:
          $ref: '#/components/schemas/Product'
        additionals:
          type: array
          items:
            $ref: '#/components/schemas/Additional'
        criadoEm:
          format: date-time
          type: string
        atualizadoEm:
          format: date-time
          type: string
      required:
        - id
        - valorUnit
        - qtSolicitada
        - vlDesconto
        - vlTotal
        - pedido
        - produto
        - additionals
        - criadoEm
        - atualizadoEm
    PedidoStatusOptionDto:
      type: object
      properties:
        value:
          type: string
          enum:
            - em_analise
            - preparando
            - feito
        label:
          type: string
      required:
        - value
        - label
    PedidoStatusColumnDto:
      type: object
      properties:
        status:
          type: string
          enum:
